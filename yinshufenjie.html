<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因数分解练习</title>
    <style>
        table {
            width: 90%;
            border-collapse: collapse;
            margin: 20px auto;
        }
/*        
        table, th, td {
            border: 1px solid black;
        }
*/        
        th, td {
            padding: 10px;
            text-align: left;
            font-size: 20px;
            width: 33.33%; /* 3列等宽 */
        }
        th {
            font-weight: bold;
        }

        /* 打印时隐藏分隔线 */
        @media print {
            hr {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="contentContainer"></div>

    <script>
        // 获取URL参数page的值，默认为1
        function getPageParam() {
            const urlParams = new URLSearchParams(window.location.search);
            const page = parseInt(urlParams.get('page')) || 1;
            return Math.max(1, page); // 确保至少为1
        }


        const biaonei_1 = [
		    "4 = ", //2*2
			"6 = ", //2*3
		    "8 = ", //2*4
			"9 = ", //3*3
		    "10 = ", //2*5
		    "14 = ", //2*7
			"15 = ", //3*5
			"21 = ", //3*7
		    "25 = ", //5*5
		    "27 = ", //3*9
			"35 = ", //5*7
			"49 = " //7*7
		];

        const biaonei_2 = [
			"12 = ", //2*6 3*4
			"16 = ", //2*8 4*4 
			"18 = ", //2*9 3*6
			"20 = ", //2*10 4*5
			"28 = ", //2*14 4*7
			"32 = ", //2*16 4*8
			"45 = ", //3*15 5*9
			"63 = ", //3*21 7*9
			"81 = " //3*27 9*9
		];

        const biaonei_3 = [
			"24 = ", //2*12 3*8 4*6
			"30 = ", //2*15 3*10 5*6
			"40 = ", //2*20 4*10 5*8
			"42 = ", //2*21 3*14 6*7
			"54 = ", //2*27 3*18 6*9
			"56 = ", //2*28 4*14 7*8
			"64 = " //2*32 4*16 8*8
		];

        const biaonei_4 = [
			"36 = ", //2*18 3*12 4*9 6*6
			"48 = " //2*24 3*16 4*12 6*8
		];

        const biaonei_5 = [
			"72 = " //2*36 3*24 4*18 6*12 8*9
		];


        const biaowai_1 = [
			"26 = ", //2*13
			"33 = ", //3*11
			"34 = ", //2*17
			"38 = ", //2*19
			"39 = ", //3*13
			"46 = ", //2*23
			"51 = ", //3*17
			"55 = ", //5*11
			"57 = ", //3*19
			"58 = ", //2*29
			"62 = ", //2*31
			"65 = ", //5*13
			"69 = ", //3*23
			"74 = ", //2*37
			"77 = ", //7*11
			"82 = ", //2*41
			"85 = ", //5*17
			"86 = ", //2*43
			"87 = ", //3*29
			"91 = ", //7*13
			"93 = ", //3*31
			"94 = ", //2*47
			"95 = " //5*19
		];

        const biaowai_2 = [
			"22 = ", //2*11
			"44 = ", //2*22 4*11
			"50 = ", //2*25 5*10
			"52 = ", //2*26 4*13
			"68 = ", //2*34 4*17
			"75 = ", //3*25 5*15
			"76 = ", //2*38 4*19
			"92 = ", //2*46 4*23
			"98 = ", //2*49 7*14
			"99 = " //3*33 9*11
		];


        const biaowai_3 = [
			"66 = ", //2*33 3*2 6*11
			"70 = ", //2*35 5*14 7*10
			"78 = ", //2*39 3*26 6*13
			"88 = " //2*44 4*22 8*11
		];

        const biaowai_4 = [
			"80 = ", //2*40 4*20 5*16 8*10
			"100 = " //2*50 4*25 5*20 10*10
		];

        const biaowai_5 = [
			"60 = ", //2*30 3*20 4*15 5*12 6*10
			"84 = ", //2*42 3*28 4*21 6*14 7*12 
			"90 = ", //2*45 3*30 5*18 6*15 9*10
			"96 = " //2*48 3*32 4*24 6*16 8*12
		];


        //题目集合
        const allBiaonei = [...biaonei_1, ...biaonei_2, ...biaonei_3, ...biaonei_4, ...biaonei_5];
		const allBiaowai = [...biaowai_1, ...biaowai_2, ...biaowai_3, ...biaowai_4, ...biaowai_5];
        
		allQuestions = [...allBiaonei]

        //参数中是否指定了表内
        const urlParams = new URLSearchParams(window.location.search);
        const all = urlParams.get('all') || '0';
		if (all != "0") {
			allQuestions.push(...allBiaowai);
		}
        
        

        // 创建单个表格
        function createTable() {
            const table = document.createElement('table');
            // 表头行
            const headerRow = table.insertRow();
            const headerCell1 = headerRow.insertCell(0);
            const headerCell2 = headerRow.insertCell(1);
            const headerCell3 = headerRow.insertCell(2);
            headerCell1.textContent = "姓名：";
            headerCell2.textContent = "日期：";
            headerCell3.textContent = "用时：";
            // 空行
            const emptyRow = table.insertRow();
            const emptyCell = emptyRow.insertCell(0);
            emptyCell.colSpan = 3;
            emptyCell.textContent = "-----------------------------------------------------------------";
            
            // 生成20行内容
            for (let r = 0; r < 20; r++) {
                const row = table.insertRow();

                for (let c = 0; c < 3; c++) {
                    const cell = row.insertCell(c);
                    const randomProblem = allQuestions[Math.floor(Math.random() * allQuestions.length)];
                    cell.textContent = randomProblem;
                }
            }
            return table;
        }

        // 页面加载时生成内容
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('contentContainer');
            const pageCount = getPageParam();
            for (let i = 1; i <= pageCount; i++) {
                // 添加表格
                const table = createTable();
                container.appendChild(table);
                // 如果不是最后一页，添加分页符和分隔线
                if (i < pageCount) {
                    // 添加分隔线
                    const separator = document.createElement('hr');
                    separator.style.border = '2px solid #ccc';
                    separator.style.margin = '3px 0';
                    container.appendChild(separator);

                    // 添加分页符
                    table.style.pageBreakAfter = 'always';
                }
            }
        });
    </script>
</body>
</html>
